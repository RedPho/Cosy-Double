version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cozy_double_db
    restart: always
    environment:
      POSTGRES_USER: cozy_user
      POSTGRES_PASSWORD: cozy_password
      POSTGRES_DB: cozy_double
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
